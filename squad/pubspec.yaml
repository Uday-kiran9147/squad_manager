name: squad
description: "Squad - Group Hangout Planner app built with Flutter and Firebase."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # Firebase - Compatible versions
  firebase_core: ^2.32.0
  firebase_auth: ^4.18.0
  cloud_firestore: ^4.17.5
  firebase_storage: ^11.6.0
  firebase_messaging: ^14.7.0
  
  # State management
  flutter_riverpod: ^2.4.0
  
  # Navigation
  go_router: ^13.2.0
  
  # Service locator / DI
  get_it: ^7.5.0
  
  # HTTP client
  dio: ^5.3.0
  
  # Immutable models
  freezed_annotation: ^2.4.0
  
  # JSON serialization
  json_annotation: ^4.8.0
  
  # Utilities
  share_plus: ^7.1.0
  url_launcher: ^6.1.0
  cached_network_image: ^3.3.0
  intl: ^0.19.0
  google_fonts: ^6.1.0
  confetti: ^0.7.0
  in_app_purchase: ^3.1.0
  google_sign_in: ^7.2.0
  package_info_plus: ^9.0.0
  add_2_calendar: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  
  # Code generation
  build_runner: ^2.4.0
  freezed: ^2.4.0
  json_serializable: ^6.7.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/squad_play_store.png"
  min_sdk_android: 21
